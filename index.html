<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Admin Analytics Dashboard</title>

  <!-- CSS FILE -->
  <link rel="stylesheet" href="style.css">

  <!-- CHART.JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="dashboard-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="logo">
        <h2>Job Portal</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="#">Dashboard</a>
        <a href="#">Jobs</a>
        <a href="#">Applicants</a>
        <a href="#">Analytics</a>
        <a href="#">Settings</a>
      </nav>

    </aside>

    <!-- MAIN SECTION -->
    <div class="main-section">

      <!-- TOP NAVBAR -->
      <header class="navbar">

        <div>
          <h1>Admin Dashboard</h1>
        </div>

        <div class="nav-right">
          <button class="logout-btn">Logout</button>
        </div>

      </header>

      <!-- MAIN CONTENT -->
      <main class="content">

        <!-- KPI CARDS -->
        <section class="cards-container">

          <div class="card">
            <h3>Total Jobs</h3>
            <p id="total-jobs">0</p>
          </div>

          <div class="card">
            <h3>Total Applications</h3>
            <p id="total-applications">0</p>
          </div>

          <div class="card">
            <h3>Total Users</h3>
            <p id="total-users">0</p>
          </div>

          <div class="card">
            <h3>Active Jobs</h3>
            <p id="active-jobs">0</p>
          </div>

        </section>

        <!-- CHARTS -->
        <section class="charts-container">

          <div class="chart-box">
            <h2>Applications Per Job</h2>
            <canvas id="applicationsChart"></canvas>
          </div>

          <div class="chart-box">
            <h2>Jobs By Category</h2>
            <canvas id="categoryChart"></canvas>
          </div>

        </section>

        <!-- TABLES -->
        <section class="tables-container">

          <!-- JOBS TABLE -->
          <div class="table-box">

            <h2>Recent Jobs</h2>

            <table>

              <thead>
                <tr>
                  <th>ID</th>
                  <th>Job Title</th>
                  <th>Category</th>
                  <th>Status</th>
                </tr>
              </thead>

              <tbody id="jobs-table-body">
              </tbody>

            </table>

          </div>

          <!-- APPLICATION TABLE -->
          <div class="table-box">

            <h2>Recent Applications</h2>

            <table>

              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Applied For</th>
                </tr>
              </thead>

              <tbody id="applications-table-body">
              </tbody>

            </table>

          </div>

        </section>

      </main>

    </div>

  </div>

  <!-- JAVASCRIPT -->
  <script src="script.js"></script>

</body>
</html>
